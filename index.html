<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Polygon TG Multisig Escrow</title>
    <style>
      /* এটা হলো CSS (ডিজাইন) */
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: white;
        text-align: center;
      }
      .wallet-card {
        border: 2px solid #8247e5;
        padding: 20px;
        border-radius: 10px;
        display: inline-block;
        margin-top: 50px;
      }
      .btn-connect {
        background-color: #8247e5;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .btn-approve {
        background-color: #28a745;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wallet-card">
      <h2>Polygon TG Multisig Escrow Wallet 🛡️</h2>
      <p>Status: <span style="color: red">Disconnected</span></p>
      <button class="btn-connect">Connect Wallet</button>
      <button class="btn-approve">Approve Transaction</button>
    </div>
  </body>
</html>
